version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fitness_studio_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fitness_studio
    volumes:
      - mongodb_data:/data/db
    networks:
      - fitness_network

  api:
    build: .
    container_name: fitness_studio_api
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: fitness_studio
      JWT_SECRET_KEY: your-secret-key-change-this-in-production
      JWT_ALGORITHM: HS256
      TOKEN_EXPIRE_MINUTES: 30
      TIMEZONE: Asia/Kolkata
    depends_on:
      - mongodb
    volumes:
      - .:/app
    networks:
      - fitness_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:

networks:
  fitness_network:
    driver: bridge
